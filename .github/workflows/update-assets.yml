name: Update DroidDeck Assets

on:
  schedule:
    - cron: '0 3 * * *'   # runs daily at 03:00 UTC
  workflow_dispatch:       # allows manual trigger from GitHub UI

permissions:
  contents: write          # needed to create releases and push tags

jobs:
  update-assets:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 1. Fetch latest release tags ────────────────────────────────────
      - name: Fetch latest release versions
        id: versions
        run: |
          proot=$(gh api repos/proot-me/proot/releases/latest --jq '.tag_name')
          dxvk=$(gh api repos/doitsujin/dxvk/releases/latest --jq '.tag_name')
          vkd3d=$(gh api repos/HansKristian-Work/vkd3d-proton/releases/latest --jq '.tag_name')
          turnip=$(gh api repos/whitebelyash/freedreno_turnip-CI/releases/latest --jq '.tag_name')

          echo "proot=$proot"     >> "$GITHUB_OUTPUT"
          echo "dxvk=$dxvk"       >> "$GITHUB_OUTPUT"
          echo "vkd3d=$vkd3d"     >> "$GITHUB_OUTPUT"
          echo "turnip=$turnip"   >> "$GITHUB_OUTPUT"

          echo "Fetched: proot=$proot | dxvk=$dxvk | vkd3d=$vkd3d | turnip=$turnip"

      # ── 2. Compare with current manifest (skip if nothing changed) ──────
      - name: Check for version changes
        id: changed
        run: |
          if [ -f manifest.json ]; then
            cur_proot=$(jq -r '.proot.version'  manifest.json)
            cur_dxvk=$(jq  -r '.dxvk.version'   manifest.json)
            cur_vkd3d=$(jq -r '.vkd3d.version'  manifest.json)
            cur_turnip=$(jq -r '.turnip.version' manifest.json)
          else
            cur_proot="" cur_dxvk="" cur_vkd3d="" cur_turnip=""
          fi

          if [[ "$cur_proot"  == "${{ steps.versions.outputs.proot }}"  &&
                "$cur_dxvk"   == "${{ steps.versions.outputs.dxvk }}"   &&
                "$cur_vkd3d"  == "${{ steps.versions.outputs.vkd3d }}"  &&
                "$cur_turnip" == "${{ steps.versions.outputs.turnip }}" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "All versions up-to-date — nothing to do."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changes detected — proceeding."
          fi

      # ── 3. Download assets ───────────────────────────────────────────────
      - name: Download PRoot binary
        if: steps.changed.outputs.changed == 'true'
        run: |
          TAG="${{ steps.versions.outputs.proot }}"
          # Download the aarch64 static binary specifically
          gh release download "$TAG" \
            --repo proot-me/proot \
            --pattern '*aarch64*' \
            --dir assets/
          # Normalise filename
          mv assets/*aarch64* assets/proot-aarch64-static 2>/dev/null || true

      - name: Download DXVK archive
        if: steps.changed.outputs.changed == 'true'
        run: |
          TAG="${{ steps.versions.outputs.dxvk }}"
          gh release download "$TAG" \
            --repo doitsujin/dxvk \
            --pattern '*.tar.gz' \
            --dir assets/
          # Keep filename predictable for the app
          mv assets/dxvk-*.tar.gz assets/dxvk.tar.gz 2>/dev/null || true

      - name: Download VKD3D-Proton archive
        if: steps.changed.outputs.changed == 'true'
        run: |
          TAG="${{ steps.versions.outputs.vkd3d }}"
          gh release download "$TAG" \
            --repo HansKristian-Work/vkd3d-proton \
            --pattern '*.tar.zst' \
            --dir assets/
          # Recompress .tar.zst → .tar.gz for consistency
          cd assets
          zstd -d vkd3d-proton-*.tar.zst --stdout | gzip > vkd3d-proton.tar.gz
          rm -f vkd3d-proton-*.tar.zst
          cd ..

      - name: Download Turnip archive
        if: steps.changed.outputs.changed == 'true'
        run: |
          TAG="${{ steps.versions.outputs.turnip }}"
          gh release download "$TAG" \
            --repo whitebelyash/freedreno_turnip-CI \
            --pattern '*.zip' \
            --dir assets/
          # Repack .zip → .tar.gz for consistency
          cd assets
          unzip -q *.zip -d turnip_extracted
          tar -czf turnip.tar.gz -C turnip_extracted .
          rm -rf *.zip turnip_extracted
          cd ..

      # ── 4. Generate manifest.json ────────────────────────────────────────
      - name: Update manifest.json
        if: steps.changed.outputs.changed == 'true'
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          jq -n \
            --arg proot_ver   "${{ steps.versions.outputs.proot }}"  \
            --arg dxvk_ver    "${{ steps.versions.outputs.dxvk }}"   \
            --arg vkd3d_ver   "${{ steps.versions.outputs.vkd3d }}"  \
            --arg turnip_ver  "${{ steps.versions.outputs.turnip }}" \
            --arg ts          "$TIMESTAMP" \
            '{
              updated_at: $ts,
              proot:   { version: $proot_ver,  asset: "proot-aarch64-static" },
              dxvk:    { version: $dxvk_ver,   asset: "dxvk.tar.gz" },
              vkd3d:   { version: $vkd3d_ver,  asset: "vkd3d-proton.tar.gz" },
              turnip:  { version: $turnip_ver, asset: "turnip.tar.gz" }
            }' > manifest.json

          echo "Generated manifest.json:"
          cat manifest.json

      # ── 5. Determine new release tag ─────────────────────────────────────
      - name: Compute release tag
        if: steps.changed.outputs.changed == 'true'
        id: tag
        run: |
          # Use date-based tag so every daily update gets its own release
          echo "tag=assets-$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      # ── 6. Create GitHub Release with all assets ─────────────────────────
      - name: Create GitHub Release
        if: steps.changed.outputs.changed == 'true'
        run: |
          TAG="${{ steps.tag.outputs.tag }}"

          # Delete existing release for today if it already exists (re-run safety)
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin --delete "refs/tags/$TAG" 2>/dev/null || true

          gh release create "$TAG" \
            --title "DroidDeck Assets – $(date -u +%Y-%m-%d)" \
            --notes "## Component versions

          | Component | Version |
          |-----------|---------|
          | PRoot | ${{ steps.versions.outputs.proot }} |
          | DXVK | ${{ steps.versions.outputs.dxvk }} |
          | VKD3D-Proton | ${{ steps.versions.outputs.vkd3d }} |
          | Turnip | ${{ steps.versions.outputs.turnip }} |

          > FEX and RootFS must be set up manually on the device — see README." \
            assets/proot-aarch64-static \
            assets/dxvk.tar.gz \
            assets/vkd3d-proton.tar.gz \
            assets/turnip.tar.gz \
            manifest.json
