name: Update Assets

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # Weekly (Sunday midnight)

jobs:
  download-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl wget tar xz-utils zstd

      - name: Download PRoot
        run: |
          curl -sL "https://github.com/proot-me/proot/releases/download/v5.3.0/proot-v5.3.0-aarch64-static" \
            -o proot-v5.3.0-aarch64-static
          chmod +x proot-v5.3.0-aarch64-static

      - name: Download DXVK
        run: |
          curl -sL "https://github.com/doitsujin/dxvk/releases/download/v2.7.1/dxvk-2.7.1.tar.gz" \
            -o dxvk.tar.gz

      - name: Download VKD3D-Proton
        run: |
          curl -sL "https://github.com/HansKristian-Work/vkd3d-proton/releases/download/v3.0b/vkd3d-proton-3.0b.tar.zst" \
            -o vkd3d-proton.tar.zst
          tar -I zstd -xf vkd3d-proton.tar.zst
          mv vkd3d-proton-3.0b vkd3d-proton
          tar -czf vkd3d-proton.tar.gz vkd3d-proton

      - name: Download Turnip
        run: |
          curl -sL "https://github.com/whitebelyash/freedreno_turnip-CI/releases/download/tu_v24/a8xx-gen8-V24.zip" \
            -o turnip.zip

      - name: Create release
        id: create_release
        run: |
          # Get existing release or create new
          RELEASE_TAG="v1.0.0"
          EXISTING=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$RELEASE_TAG" | jq -r '.id // empty')

          # Create or update release
          if [ -n "$EXISTING" ]; then
            echo "Release exists, updating..."
            # Delete and recreate for simplicity
            curl -s -X DELETE -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$EXISTING"
          fi

          # Create new release
          RESPONSE=$(curl -s -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "tag_name": "v1.0.0",
              "name": "DroidDeck Assets v1.0.0",
              "draft": false,
              "prerelease": false
            }' \
            "https://api.github.com/repos/${{ github.repository }}/releases")

          RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id')
          echo "Created release ID: $RELEASE_ID"
          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT

      - name: Upload PRoot
        run: |
          curl -s -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @proot-v5.3.0-aarch64-static \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.create_release.outputs.release_id }}/assets?name=proot-v5.3.0-aarch64-static"

      - name: Upload DXVK
        run: |
          curl -s -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/gzip" \
            --data-binary @dxvk.tar.gz \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.create_release.outputs.release_id }}/assets?name=dxvk.tar.gz"

      - name: Upload VKD3D
        run: |
          curl -s -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/gzip" \
            --data-binary @vkd3d-proton.tar.gz \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.create_release.outputs.release_id }}/assets?name=vkd3d-proton.tar.gz"

      - name: Upload Turnip
        run: |
          curl -s -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/zip" \
            --data-binary @turnip.zip \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.create_release.outputs.release_id }}/assets?name=turnip.zip"

      - name: Update manifest.json
        run: |
          cat > manifest.json << 'EOF'
          {
            "version": "1.0.0",
            "updated": "$(date -u +%Y-%m-%d)",
            "components": {
              "proot": {
                "version": "5.3.0",
                "url": "https://github.com/koubry02/droiddeck-assets/releases/download/v1.0.0/proot-v5.3.0-aarch64-static"
              },
              "dxvk": {
                "version": "2.7.1",
                "url": "https://github.com/koubry02/droiddeck-assets/releases/download/v1.0.0/dxvk.tar.gz"
              },
              "vkd3d-proton": {
                "version": "3.0b",
                "url": "https://github.com/koubry02/droiddeck-assets/releases/download/v1.0.0/vkd3d-proton.tar.gz"
              },
              "turnip": {
                "version": "v24",
                "url": "https://github.com/koubry02/droiddeck-assets/releases/download/v1.0.0/turnip.zip"
              }
            },
            "note": "FEX and RootFS must be downloaded on device via FEXRootFSFetcher"
          }
          EOF

          curl -s -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data-binary @manifest.json \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.create_release.outputs.release_id }}/assets?name=manifest.json"