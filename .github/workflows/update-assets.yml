name: Update Assets

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # Weekly - Sunday midnight

jobs:
  update-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y zstd

      # ========== PRoot ==========
      - name: Get PRoot latest version
        id: proot-version
        uses: dsaltares/fetch-gh-release-asset@master
        with:
          repo: proot-me/proot
          version: latest
          file: "aarch64.*static"
          regex: true

      - name: Rename PRoot with version
        run: |
          mv proot-v*-aarch64-static proot-v${PROOT_TAG}-aarch64-static
          chmod +x proot-v${PROOT_TAG}-aarch64-static
        env:
          PROOT_TAG: ${{ steps.proot-version.outputs.version }}

      # ========== DXVK ==========
      - name: Get DXVK latest
        id: dxvk-version
        uses: dsaltares/fetch-gh-release-asset@master
        with:
          repo: doitsujin/dxvk
          version: latest
          file: "dxvk-.*\\.tar\\.gz"
          regex: true

      - name: Rename DXVK with version
        run: |
          mv dxvk-*.tar.gz dxvk-v${DXVK_VERSION}.tar.gz
        env:
          DXVK_VERSION: ${{ steps.dxvk-version.outputs.version }}

      # ========== VKD3D-Proton ==========
      - name: Get VKD3D-Proton latest
        id: vkd3d-version
        uses: dsaltares/fetch-gh-release-asset@master
        with:
          repo: HansKristian-Work/vkd3d-proton
          version: latest
          file: ".*\\.tar\\.zst"
          regex: true

      - name: Convert VKD3D zst to tar.gz
        run: |
          # Extract .tar.zst and convert to .tar.gz
          tar -I zstd -xf vkd3d-proton-*.tar.zst
          # Rename the extracted folder
          mv vkd3d-proton-* vkd3d-proton-tmp
          # Repack as tar.gz
          tar -czf vkd3d-proton-v${VKD3D_VERSION}.tar.gz vkd3d-proton-tmp/
          rm -rf vkd3d-proton-tmp
        env:
          VKD3D_VERSION: ${{ steps.vkd3d-version.outputs.version }}

      # ========== Turnip ==========
      - name: Get Turnip latest
        id: turnip-version
        uses: dsaltares/fetch-gh-release-asset@master
        with:
          repo: whitebelyash/freedreno_turnip-CI
          version: latest
          file: "a8xx-gen8.*\\.zip"
          regex: true

      - name: Rename Turnip with version
        run: |
          mv a8xx-gen8-*.zip turnip-${TURNIP_TAG}.zip
        env:
          TURNIP_TAG: ${{ steps.turnip-version.outputs.version }}

      # ========== Create Release ==========
      - name: Create release
        id: create-release
        run: |
          DATE=$(date -u +%Y%m%d)
          RELEASE_TAG="v${DATE}"
          
          # Check if release exists and delete
          EXISTING=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$RELEASE_TAG" | jq -r '.id // empty')
          
          if [ -n "$EXISTING" ]; then
            curl -s -X DELETE -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$EXISTING"
          fi
          
          # Create new release
          RESPONSE=$(curl -s -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"$RELEASE_TAG\",
              \"name\": \"DroidDeck Assets $RELEASE_TAG\",
              \"draft\": false,
              \"prerelease\": false
            }" \
            "https://api.github.com/repos/${{ github.repository }}/releases")
          
          RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id')
          echo "Created release: $RELEASE_TAG (ID: $RELEASE_ID)"
          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT

      # ========== Upload Assets ==========
      - name: Upload PRoot
        run: |
          curl -s -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @proot-v${PROOT_TAG}-aarch64-static \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.create-release.outputs.release_id }}/assets?name=proot-${{ steps.proot-version.outputs.version }}-aarch64-static"
        env:
          PROOT_TAG: ${{ steps.proot-version.outputs.version }}

      - name: Upload DXVK
        run: |
          curl -s -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/gzip" \
            --data-binary @dxvk-v${DXVK_VERSION}.tar.gz \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.create-release.outputs.release_id }}/assets?name=dxvk-${{ steps.dxvk-version.outputs.version }}.tar.gz"
        env:
          DXVK_VERSION: ${{ steps.dxvk-version.outputs.version }}

      - name: Upload VKD3D
        run: |
          curl -s -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/gzip" \
            --data-binary @vkd3d-proton-v${VKD3D_VERSION}.tar.gz \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.create-release.outputs.release_id }}/assets?name=vkd3d-proton-${{ steps.vkd3d-version.outputs.version }}.tar.gz"
        env:
          VKD3D_VERSION: ${{ steps.vkd3d-version.outputs.version }}

      - name: Upload Turnip
        run: |
          curl -s -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/zip" \
            --data-binary @turnip-${TURNIP_TAG}.zip \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.create-release.outputs.release_id }}/assets?name=turnip-${{ steps.turnip-version.outputs.version }}.zip"
        env:
          TURNIP_TAG: ${{ steps.turnip-version.outputs.version }}

      # ========== Upload manifest.json ==========
      - name: Create manifest
        run: |
          cat > manifest.json << EOF
          {
            "version": "$(date -u +%Y-%m-%d)",
            "components": {
              "proot": {
                "version": "${{ steps.proot-version.outputs.version }}",
                "url": "https://github.com/${{ github.repository }}/releases/download/$(date -u +%Y%m%d)/proot-${{ steps.proot-version.outputs.version }}-aarch64-static"
              },
              "dxvk": {
                "version": "${{ steps.dxvk-version.outputs.version }}",
                "url": "https://github.com/${{ github.repository }}/releases/download/$(date -u +%Y%m%d)/dxvk-${{ steps.dxvk-version.outputs.version }}.tar.gz"
              },
              "vkd3d-proton": {
                "version": "${{ steps.vkd3d-version.outputs.version }}",
                "url": "https://github.com/${{ github.repository }}/releases/download/$(date -u +%Y%m%d)/vkd3d-proton-${{ steps.vkd3d-version.outputs.version }}.tar.gz"
              },
              "turnip": {
                "version": "${{ steps.turnip-version.outputs.version }}",
                "url": "https://github.com/${{ github.repository }}/releases/download/$(date -u +%Y%m%d)/turnip-${{ steps.turnip-version.outputs.version }}.zip"
              }
            },
            "note": "FEX and RootFS must be downloaded on device via FEXRootFSFetcher"
          }
          EOF

      - name: Upload manifest
        run: |
          curl -s -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data-binary @manifest.json \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.create-release.outputs.release_id }}/assets?name=manifest.json"

      - name: Summary
        run: |
          echo "## Assets Updated"
          echo ""
          echo "| Component | Version |"
          echo "|----------|---------|"
          echo "| PRoot | ${{ steps.proot-version.outputs.version }} |"
          echo "| DXVK | ${{ steps.dxvk-version.outputs.version }} |"
          echo "| VKD3D-Proton | ${{ steps.vkd3d-version.outputs.version }} |"
          echo "| Turnip | ${{ steps.turnip-version.outputs.version }} |"
          echo ""
          echo "Release: https://github.com/${{ github.repository }}/releases/tag/$(date -u +%Y%m%d)"