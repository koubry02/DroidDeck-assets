name: Update DroidDeck Assets

on:
  schedule:
    - cron: '0 3 * * *'   # runs daily at 03:00 UTC
  workflow_dispatch:       # allows manual trigger from GitHub UI

permissions:
  contents: write          # needed to create releases and push tags

jobs:
  update-assets:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # в”Ђв”Ђ 0. Install required tools в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Install dependencies
        run: |
          sudo apt-get install -y zstd
          # zstd needed to recompress vkd3d-proton .tar.zst в†’ .tar.gz
          # unzip and jq are pre-installed on ubuntu-latest

      # в”Ђв”Ђ 1. Fetch latest release tags в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Fetch latest release versions
        id: versions
        run: |
          # DXVK, VKD3D-Proton, Turnip have real GitHub Releases with binaries.
          # PRoot tag is fetched for version tracking only вЂ” binary comes from GitLab.
          proot=$(gh api repos/proot-me/proot/releases/latest --jq '.tag_name')
          dxvk=$(gh api repos/doitsujin/dxvk/releases/latest --jq '.tag_name')
          vkd3d=$(gh api repos/HansKristian-Work/vkd3d-proton/releases/latest --jq '.tag_name')
          turnip=$(gh api repos/whitebelyash/freedreno_turnip-CI/releases/latest --jq '.tag_name')

          echo "proot=$proot"   >> "$GITHUB_OUTPUT"
          echo "dxvk=$dxvk"     >> "$GITHUB_OUTPUT"
          echo "vkd3d=$vkd3d"   >> "$GITHUB_OUTPUT"
          echo "turnip=$turnip" >> "$GITHUB_OUTPUT"

          echo "Fetched: proot=$proot | dxvk=$dxvk | vkd3d=$vkd3d | turnip=$turnip"

      # в”Ђв”Ђ 2. Compare with current manifest (skip if nothing changed) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Check for version changes
        id: changed
        run: |
          if [ -f manifest.json ]; then
            cur_proot=$(jq  -r '.proot.version'  manifest.json)
            cur_dxvk=$(jq   -r '.dxvk.version'   manifest.json)
            cur_vkd3d=$(jq  -r '.vkd3d.version'  manifest.json)
            cur_turnip=$(jq -r '.turnip.version' manifest.json)
          else
            cur_proot="" cur_dxvk="" cur_vkd3d="" cur_turnip=""
          fi

          if [[ "$cur_proot"  == "${{ steps.versions.outputs.proot }}"  &&
                "$cur_dxvk"   == "${{ steps.versions.outputs.dxvk }}"   &&
                "$cur_vkd3d"  == "${{ steps.versions.outputs.vkd3d }}"  &&
                "$cur_turnip" == "${{ steps.versions.outputs.turnip }}" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "All versions up-to-date вЂ” nothing to do."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changes detected вЂ” proceeding."
          fi

      - name: Create assets directory
        if: steps.changed.outputs.changed == 'true'
        run: mkdir -p assets

      # в”Ђв”Ђ 3. Download assets в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

      # PROOT
      # Real binary source: https://proot.gitlab.io/proot/bin/proot-arm64
      # proot-me/proot GitHub Releases contain SOURCE CODE ONLY вЂ” no binaries.
      - name: Download PRoot binary (GitLab CI artifact)
        if: steps.changed.outputs.changed == 'true'
        run: |
          curl -fL \
            "https://proot.gitlab.io/proot/bin/proot-arm64" \
            -o assets/proot-aarch64-static
          chmod +x assets/proot-aarch64-static
          tar -czf assets/proot.tar.gz -C assets proot-aarch64-static
          rm assets/proot-aarch64-static

      # DXVK
      # Real asset filename: dxvk-{version}.tar.gz  (e.g. dxvk-2.7.1.tar.gz)
      # Note: GitHub also auto-generates "Source code.tar.gz" вЂ” the explicit
      # prefix pattern 'dxvk-*.tar.gz' avoids matching that source archive.
      - name: Download DXVK archive
        if: steps.changed.outputs.changed == 'true'
        run: |
          TAG="${{ steps.versions.outputs.dxvk }}"
          gh release download "$TAG" \
            --repo doitsujin/dxvk \
            --pattern 'dxvk-*.tar.gz' \
            --dir assets/
          mv assets/dxvk-*.tar.gz assets/dxvk.tar.gz

      # VKD3D-PROTON
      # Real asset filename: vkd3d-proton-{version}.tar.zst
      # (e.g. vkd3d-proton-3.0b.tar.zst) вЂ” ALWAYS .tar.zst, never .tar.gz.
      # Recompressed to .tar.gz via streaming pipe (no full disk extraction).
      - name: Download VKD3D-Proton archive
        if: steps.changed.outputs.changed == 'true'
        run: |
          TAG="${{ steps.versions.outputs.vkd3d }}"
          gh release download "$TAG" \
            --repo HansKristian-Work/vkd3d-proton \
            --pattern 'vkd3d-proton-*.tar.zst' \
            --dir assets/
          zstd -d assets/vkd3d-proton-*.tar.zst --stdout | gzip > assets/vkd3d-proton.tar.gz
          rm -f assets/vkd3d-proton-*.tar.zst

      # TURNIP
      # Real asset filename: mesa-turnip-{arch}-V{build}.zip
      # (e.g. mesa-turnip-aarch64-V25.zip) вЂ” always a single .zip per release.
      # Repacked to .tar.gz for consistency.
      - name: Download Turnip archive
        if: steps.changed.outputs.changed == 'true'
        run: |
          TAG="${{ steps.versions.outputs.turnip }}"
          gh release download "$TAG" \
            --repo whitebelyash/freedreno_turnip-CI \
            --pattern '*.zip' \
            --dir assets/
          unzip -q assets/*.zip -d assets/turnip_extracted
          tar -czf assets/turnip.tar.gz -C assets/turnip_extracted .
          rm -rf assets/*.zip assets/turnip_extracted

      # в”Ђв”Ђ 4. Generate manifest.json в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Update manifest.json
        if: steps.changed.outputs.changed == 'true'
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          jq -n \
            --arg proot_ver  "${{ steps.versions.outputs.proot }}"  \
            --arg dxvk_ver   "${{ steps.versions.outputs.dxvk }}"   \
            --arg vkd3d_ver  "${{ steps.versions.outputs.vkd3d }}"  \
            --arg turnip_ver "${{ steps.versions.outputs.turnip }}" \
            --arg ts         "$TIMESTAMP" \
            '{
              updated_at: $ts,
              proot:  { version: $proot_ver,  asset: "proot.tar.gz" },
              dxvk:   { version: $dxvk_ver,   asset: "dxvk.tar.gz" },
              vkd3d:  { version: $vkd3d_ver,  asset: "vkd3d-proton.tar.gz" },
              turnip: { version: $turnip_ver, asset: "turnip.tar.gz" }
            }' > manifest.json

          echo "Generated manifest.json:"
          cat manifest.json

      # в”Ђв”Ђ 5. Determine release tag в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Compute release tag
        if: steps.changed.outputs.changed == 'true'
        id: tag
        run: |
          echo "tag=assets-$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      # в”Ђв”Ђ 6. Publish GitHub Release в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Create GitHub Release
        if: steps.changed.outputs.changed == 'true'
        run: |
          TAG="${{ steps.tag.outputs.tag }}"

          # Delete today's release if it already exists (safe re-run)
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin --delete "refs/tags/$TAG" 2>/dev/null || true

          gh release create "$TAG" \
            --title "DroidDeck Assets вЂ“ $(date -u +%Y-%m-%d)" \
            --notes "## Component versions

          | Component | Version |
          |-----------|---------|
          | PRoot | ${{ steps.versions.outputs.proot }} |
          | DXVK | ${{ steps.versions.outputs.dxvk }} |
          | VKD3D-Proton | ${{ steps.versions.outputs.vkd3d }} |
          | Turnip | ${{ steps.versions.outputs.turnip }} |

          > FEX and RootFS must be set up manually on the device вЂ” see README." \
            assets/proot.tar.gz \
            assets/dxvk.tar.gz \
            assets/vkd3d-proton.tar.gz \
            assets/turnip.tar.gz \
            manifest.json
