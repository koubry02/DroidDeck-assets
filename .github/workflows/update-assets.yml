name: Update DroidDeck Assets

on:
  schedule:
    - cron: '0 3 1 * *'   # runs on the 1st of every month at 03:00 UTC
  workflow_dispatch:      # allows manual trigger from GitHub UI

permissions:
  contents: write         # needed to create releases, push tags, and commit manifest

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Job 0 — Resolve versions (runs first, all build jobs depend on this)
  #   Fetches ALL component version strings from upstream APIs, compares
  #   against the current manifest.json, and outputs per-component change
  #   flags so downstream build jobs can run independently.
  # ═══════════════════════════════════════════════════════════════════════════
  resolve-versions:
    runs-on: ubuntu-latest
    outputs:
      rootfs_version:    ${{ steps.versions.outputs.rootfs }}
      proot_version:     ${{ steps.versions.outputs.proot }}
      dxvk_version:      ${{ steps.versions.outputs.dxvk }}
      vkd3d_version:     ${{ steps.versions.outputs.vkd3d }}
      turnip_version:    ${{ steps.versions.outputs.turnip }}
      fex_version:       ${{ steps.versions.outputs.fex }}
      fex_rootfs_version: ${{ steps.versions.outputs.fex_rootfs }}
      changed_host:      ${{ steps.changed.outputs.changed_host }}
      changed_guest:     ${{ steps.changed.outputs.changed_guest }}
      changed_fex:       ${{ steps.changed.outputs.changed_fex }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest versions
        id: versions
        run: |
          # RootFS: Ubuntu 26.04 Resolute
          rootfs="resolute"

          # PRoot: Android build with static libtalloc (green-green-avk)
          proot="android-static"

          dxvk=$(gh api repos/doitsujin/dxvk/releases/latest --jq '.tag_name')
          vkd3d=$(gh api repos/HansKristian-Work/vkd3d-proton/releases/latest --jq '.tag_name')
          turnip=$(gh api repos/whitebelyash/freedreno_turnip-CI/releases/latest --jq '.tag_name')
          fex=$(gh api repos/FEX-Emu/FEX/releases/latest --jq '.tag_name')
          fex_rootfs="Ubuntu_24_04-2026-05-18"

          echo "rootfs=$rootfs"             >> "$GITHUB_OUTPUT"
          echo "proot=$proot"               >> "$GITHUB_OUTPUT"
          echo "dxvk=$dxvk"                 >> "$GITHUB_OUTPUT"
          echo "vkd3d=$vkd3d"               >> "$GITHUB_OUTPUT"
          echo "turnip=$turnip"             >> "$GITHUB_OUTPUT"
          echo "fex=$fex"                   >> "$GITHUB_OUTPUT"
          echo "fex_rootfs=$fex_rootfs"     >> "$GITHUB_OUTPUT"

          echo "Fetched: rootfs=$rootfs | proot=$proot | dxvk=$dxvk | vkd3d=$vkd3d | turnip=$turnip | fex=$fex | fex_rootfs=$fex_rootfs"

      - name: Compare versions against manifest
        id: changed
        run: |
          if [ -f manifest.json ]; then
            cur_rootfs=$(jq -r '.rootfs.version // empty' manifest.json)
            cur_proot=$(jq  -r '.proot.version  // empty' manifest.json)
            cur_dxvk=$(jq   -r '.dxvk.version   // empty' manifest.json)
            cur_vkd3d=$(jq  -r '.vkd3d.version  // empty' manifest.json)
            cur_turnip=$(jq -r '.turnip.version // empty' manifest.json)
            cur_fex=$(jq    -r '.fex.version    // empty' manifest.json)
            cur_fex_rootfs=$(jq -r '.fex_rootfs_steam.version // empty' manifest.json)
          else
            cur_rootfs="" cur_proot="" cur_dxvk="" cur_vkd3d="" cur_turnip="" cur_fex="" cur_fex_rootfs=""
          fi

          # Host assets: rootfs, proot, dxvk, vkd3d, turnip
          changed_host="false"
          if [[ "$cur_rootfs"  != "${{ steps.versions.outputs.rootfs }}"  ||
                "$cur_proot"   != "${{ steps.versions.outputs.proot }}"   ||
                "$cur_dxvk"    != "${{ steps.versions.outputs.dxvk }}"    ||
                "$cur_vkd3d"   != "${{ steps.versions.outputs.vkd3d }}"   ||
                "$cur_turnip"  != "${{ steps.versions.outputs.turnip }}" ]]; then
            changed_host="true"
          fi

          # Guest rootfs
          changed_guest="false"
          if [[ "$cur_fex_rootfs" != "${{ steps.versions.outputs.fex_rootfs }}" ]]; then
            changed_guest="true"
          fi

          # FEX binaries
          changed_fex="false"
          if [[ "$cur_fex" != "${{ steps.versions.outputs.fex }}" ]]; then
            changed_fex="true"
          fi

          echo "changed_host=$changed_host"   >> "$GITHUB_OUTPUT"
          echo "changed_guest=$changed_guest" >> "$GITHUB_OUTPUT"
          echo "changed_fex=$changed_fex"     >> "$GITHUB_OUTPUT"

          echo "Changes: host=$changed_host | guest=$changed_guest | fex=$changed_fex"

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 1 — Host assets (ARM64 native)
  #   Builds: RootFS (native mmdebstrap, no qemu-user-static overhead),
  #           PRoot, DXVK, VKD3D-Proton, Turnip, InstallFEX.py
  #   Uploads: host-assets artifact for the release job
  # ═══════════════════════════════════════════════════════════════════════════
  build-host-assets:
    needs: [resolve-versions]
    runs-on: ubuntu-24.04-arm
    if: needs.resolve-versions.outputs.changed_host == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 0. Install required tools ────────────────────────────────────────
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y mmdebstrap ubuntu-keyring pigz

      # ── 1. RootFS ───────────────────────────────────────────────────────
      - name: Cache RootFS tarball
        id: cache-rootfs
        uses: actions/cache@v4
        with:
          path: assets/rootfs.tar.gz
          key: rootfs-${{ needs.resolve-versions.outputs.rootfs_version }}
          restore-keys: |
            rootfs-

      - name: Build RootFS (native mmdebstrap)
        if: steps.cache-rootfs.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          echo "Creating RootFS using mmdebstrap (Azure mirror, parallel gzip)..."
          sudo mmdebstrap --variant=minbase --architectures=arm64 \
            --include=python3,libstdc++6,libgcc-s1 \
            --keyring=/usr/share/keyrings/ubuntu-archive-keyring.gpg \
            resolute - \
            http://azure.ports.ubuntu.com/ubuntu-ports/ \
            | pigz -p"$(nproc)" > assets/rootfs.tar.gz
          sudo chown "$(id -u):$(id -g)" assets/rootfs.tar.gz
          # Sanity check: fail loudly if the tarball is suspiciously small
          size=$(stat -c%s assets/rootfs.tar.gz)
          echo "rootfs.tar.gz size: $size bytes"
          if [ "$size" -lt 10000000 ]; then
            echo "ERROR: rootfs.tar.gz is under 10 MB ($size bytes) — mmdebstrap likely failed." >&2
            exit 1
          fi

      # ── 2. PRoot ─────────────────────────────────────────────────────────
      - name: Download PRoot binary
        run: |
          mkdir -p /tmp/proot_extract assets
          curl -fL "https://raw.githubusercontent.com/green-green-avk/build-proot-android/master/packages/proot-android-aarch64.tar.gz" -o assets/proot-android.tar.gz
          tar -xzf assets/proot-android.tar.gz -C /tmp/proot_extract
          cp /tmp/proot_extract/root/bin/proot assets/proot-aarch64-static
          chmod +x assets/proot-aarch64-static
          tar -czf assets/proot.tar.gz -C assets proot-aarch64-static
          rm assets/proot-aarch64-static assets/proot-android.tar.gz
          rm -rf /tmp/proot_extract

      # ── 3. DXVK ─────────────────────────────────────────────────────────
      - name: Download DXVK archive
        run: |
          TAG="${{ needs.resolve-versions.outputs.dxvk_version }}"
          gh release download "$TAG" --repo doitsujin/dxvk --pattern '*.tar.gz' --dir assets/ --clobber
          DXVK_FILE=$(find assets -maxdepth 1 -name 'dxvk-*.tar.gz' | head -1)
          mv "$DXVK_FILE" assets/dxvk.tar.gz

      # ── 4. VKD3D-Proton ─────────────────────────────────────────────────
      - name: Download VKD3D-Proton archive
        run: |
          TAG="${{ needs.resolve-versions.outputs.vkd3d_version }}"
          gh release download "$TAG" --repo HansKristian-Work/vkd3d-proton --pattern '*.tar.zst' --dir assets/ --clobber
          VKD3D_FILE=$(find assets -maxdepth 1 -name 'vkd3d-proton-*.tar.zst' | head -1)
          zstd -d "$VKD3D_FILE" --stdout | gzip > assets/vkd3d-proton.tar.gz
          rm -f "$VKD3D_FILE"

      # ── 5. Turnip ───────────────────────────────────────────────────────
      - name: Download Turnip archive
        run: |
          TAG="${{ needs.resolve-versions.outputs.turnip_version }}"
          gh release download "$TAG" --repo whitebelyash/freedreno_turnip-CI --pattern '*.zip' --dir assets/ --clobber
          TURNIP_FILE=$(find assets -maxdepth 1 -name '*.zip' | head -1)
          unzip -q "$TURNIP_FILE" -d assets/turnip_extracted
          tar -czf assets/turnip.tar.gz -C assets/turnip_extracted .
          rm -rf "$TURNIP_FILE" assets/turnip_extracted

      # ── 6. InstallFEX.py ────────────────────────────────────────────────
      - name: Download FEX install script
        run: |
          curl -fsSL "https://raw.githubusercontent.com/FEX-Emu/FEX/main/Scripts/InstallFEX.py" -o assets/InstallFEX.py

      # ── Upload host assets for the release job ──
      - name: Upload host assets
        uses: actions/upload-artifact@v6
        with:
          name: host-assets
          path: assets/
          retention-days: 1
          compression-level: 0

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 2 — Guest rootfs (x86_64)
  #   Builds: FEX x86_64 guest rootfs with Steam + Wayland + Vulkan deps
  #           (FEX squashfs → chroot → apt install + wine version pin)
  #   Uploads: guest-rootfs artifact for the release job
  # ═══════════════════════════════════════════════════════════════════════════
  build-guest-rootfs:
    needs: [resolve-versions]
    runs-on: ubuntu-latest
    if: needs.resolve-versions.outputs.changed_guest == 'true'
    steps:
      # ── 0. Install required tools ────────────────────────────────────────
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y zstd xz-utils squashfs-tools

      # ── 1. FEX x86_64 guest rootfs ──────────────────────────────────────
      - name: Cache FEX guest rootfs
        id: cache-fex-rootfs
        uses: actions/cache@v4
        with:
          path: fex-rootfs-steam.tar.gz
          key: fex-rootfs-steam-${{ needs.resolve-versions.outputs.fex_rootfs_version }}
          restore-keys: |
            fex-rootfs-steam-

      - name: Build FEX x86_64 guest rootfs with Steam deps
        if: steps.cache-fex-rootfs.outputs.cache-hit != 'true'
        run: |
          echo "Fetching FEX rootfs URL from RootFS_links.json..."
          ROOTFS_JSON=$(curl -sL "https://rootfs.fex-emu.gg/RootFS_links.json")
          SQSH_URL=$(echo "$ROOTFS_JSON" | jq -r '.v1["Ubuntu 24.04 (SquashFS)"].URL')
          echo "Downloading FEX Ubuntu_24_04.sqsh from $SQSH_URL..."
          curl -fsSL "$SQSH_URL" -o /tmp/Ubuntu_24_04.sqsh

          echo "Extracting squashfs..."
          sudo unsquashfs -d /tmp/fex-rootfs /tmp/Ubuntu_24_04.sqsh

          sudo mkdir -p /tmp/fex-rootfs/proc /tmp/fex-rootfs/sys /tmp/fex-rootfs/dev/pts
          sudo mount --bind /proc    /tmp/fex-rootfs/proc
          sudo mount --bind /sys     /tmp/fex-rootfs/sys
          sudo mount --bind /dev     /tmp/fex-rootfs/dev
          sudo mount --bind /dev/pts /tmp/fex-rootfs/dev/pts

          # Safety net: Fallback to lazy unmount (-l) if standard umount fails
          trap 'sudo umount -l /tmp/fex-rootfs/dev/pts /tmp/fex-rootfs/dev /tmp/fex-rootfs/sys /tmp/fex-rootfs/proc || true' EXIT

          sudo mkdir -p /tmp/fex-rootfs/tmp
          sudo chmod 1777 /tmp/fex-rootfs/tmp

          # FEX wiki: /etc/resolv.conf must be a regular file (not a dangling
          # symlink to systemd-resolved's stub) for guest network access.
          sudo rm -f /tmp/fex-rootfs/etc/resolv.conf
          echo "nameserver 1.1.1.1" | sudo tee /tmp/fex-rootfs/etc/resolv.conf
          sudo rm -f /tmp/fex-rootfs/etc/hosts
          printf "127.0.0.1\tlocalhost\n::1\t\tlocalhost\n" | sudo tee /tmp/fex-rootfs/etc/hosts

          sudo mkdir -p /tmp/fex-rootfs/etc/dpkg/dpkg.cfg.d
          echo "force-unsafe-io" | sudo tee /tmp/fex-rootfs/etc/dpkg/dpkg.cfg.d/01_ci

          # ── Completely obliterate all third-party PPAs (including .sources files) ──
          sudo rm -rf /tmp/fex-rootfs/etc/apt/sources.list.d/*
          sudo rm -f /tmp/fex-rootfs/etc/apt/sources.list

          sudo mkdir -p /tmp/fex-rootfs/etc/apt/preferences.d
          sudo tee /tmp/fex-rootfs/etc/apt/preferences.d/99-downgrade-kisak <<'EOF'
          Package: *
          Pin: release o=Ubuntu
          Pin-Priority: 1001
          EOF

          sudo tee /tmp/fex-rootfs/etc/apt/sources.list <<'SOURCES'
          deb http://archive.ubuntu.com/ubuntu noble main restricted universe multiverse
          deb http://archive.ubuntu.com/ubuntu noble-updates main restricted universe multiverse
          deb http://archive.ubuntu.com/ubuntu noble-security main restricted universe multiverse
          SOURCES

          # ── Fix missing system groups/users to prevent dpkg panics ──
          sudo chroot /tmp/fex-rootfs sh -c 'getent group messagebus >/dev/null || groupadd --system messagebus'
          sudo chroot /tmp/fex-rootfs sh -c 'getent passwd _apt >/dev/null || useradd --system --no-create-home --home-dir /nonexistent --shell /usr/sbin/nologin --gid nogroup _apt'
          sudo bash -c '[ -e /tmp/fex-rootfs/var/lib/dpkg/statoverride ] || touch /tmp/fex-rootfs/var/lib/dpkg/statoverride'

          # ── Strictly prevent apt from starting daemons during install ──
          sudo tee /tmp/fex-rootfs/usr/sbin/policy-rc.d >/dev/null <<'EOF'
          #!/bin/sh
          exit 101
          EOF
          sudo chmod +x /tmp/fex-rootfs/usr/sbin/policy-rc.d

          sudo chroot /tmp/fex-rootfs dpkg --add-architecture i386

          # ── Add WineHQ repository for wine 11.x ──
          curl -fsSL https://dl.winehq.org/wine-builds/winehq.key | sudo tee /tmp/fex-rootfs/etc/apt/trusted.gpg.d/winehq.asc >/dev/null
          sudo tee /tmp/fex-rootfs/etc/apt/sources.list.d/winehq.list <<'WINEHQ'
          deb https://dl.winehq.org/wine-builds/ubuntu noble main
          WINEHQ

          # Pin wine packages from WineHQ above the Ubuntu 1001 pin
          sudo tee /tmp/fex-rootfs/etc/apt/preferences.d/99-winehq <<'WINE_PIN'
          Package: winehq-devel wine-devel wine-devel-amd64 wine-devel-i386 winehq-stable wine-stable wine-stable-amd64 wine-stable-i386 winehq-staging wine-staging wine-staging-amd64 wine-staging-i386
          Pin: release o=winehq
          Pin-Priority: 1002
          WINE_PIN

          # Purge the pre-installed kisak Mesa packages (both amd64 and i386).
          sudo chroot /tmp/fex-rootfs sh -c '
            for pkg in mesa-vulkan-drivers libvulkan1 libvulkan-dev \
                       mesa-va-drivers mesa-vdpau-drivers; do
              dpkg --purge $pkg 2>/dev/null || true
              dpkg --purge $pkg:i386 2>/dev/null || true
            done
          '

          sudo chroot /tmp/fex-rootfs apt-get update -q

          # Dist-upgrade to reconcile remaining packages against our apt sources
          sudo chroot /tmp/fex-rootfs env DEBIAN_FRONTEND=noninteractive apt-get dist-upgrade -y --allow-downgrades --allow-change-held-packages -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold"

          # ── Purge any pre-existing Ubuntu wine packages ──
          sudo chroot /tmp/fex-rootfs sh -c '
            for pkg in wine wine32 wine64 wine32-preloader wine64-preloader \
                       libwine libwine-dev libwine-development fonts-wine \
                       wine-binfmt winehq-devel wine-devel wine-devel-amd64 \
                       wine-devel-i386 wine-stable wine-stable-amd64 \
                       wine-stable-i386 wine-staging wine-staging-amd64 \
                       wine-staging-i386; do
              dpkg --purge $pkg 2>/dev/null || true
              dpkg --purge $pkg:i386 2>/dev/null || true
            done
          '

          # ── Detect the latest matching wine version across amd64 and i386 ──
          sudo chroot /tmp/fex-rootfs sh -c '
            WINE_VERSION=$(LC_ALL=C apt-cache show wine-devel-i386:i386 2>/dev/null \
              | grep "^Version:" | head -1 | awk "{print \$2}")
            if [ -z "$WINE_VERSION" ]; then
              echo "ERROR: wine-devel-i386 not found in apt cache" >&2
              exit 1
            fi
            echo "$WINE_VERSION" > /tmp/wine_version.txt
            echo "Pinning wine packages to version: $WINE_VERSION"
          '
          WINE_VER=$(cat /tmp/fex-rootfs/tmp/wine_version.txt)

          # ── Install Steam + Wayland + Vulkan deps + Wine ──
          sudo chroot /tmp/fex-rootfs env DEBIAN_FRONTEND=noninteractive apt-get install -y --allow-downgrades --allow-change-held-packages --no-install-recommends -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" \
            mesa-vulkan-drivers \
            libvulkan1 \
            steam-installer \
            libwayland-client0 libwayland-egl1 libwayland-cursor0 \
            libxkbcommon0 xkb-data \
            ca-certificates curl \
            winehq-devel=${WINE_VER} \
            cabextract p7zip-full unzip \
            winetricks \
            libfaudio0 \
            libpulse0 \
            libgnutls30 \
            fontconfig \
            xdg-utils

          # ── Pre-download Gecko and Mono MSIs ──
          sudo mkdir -p /tmp/fex-rootfs/usr/share/wine/gecko /tmp/fex-rootfs/usr/share/wine/mono
          curl -fsSL "https://dl.winehq.org/wine/wine-gecko/2.47.4/wine-gecko-2.47.4-x86_64.msi" \
            -o /tmp/fex-rootfs/usr/share/wine/gecko/wine-gecko-2.47.4-x86_64.msi
          curl -fsSL "https://dl.winehq.org/wine/wine-gecko/2.47.4/wine-gecko-2.47.4-x86.msi" \
            -o /tmp/fex-rootfs/usr/share/wine/gecko/wine-gecko-2.47.4-x86.msi
          curl -fsSL "https://dl.winehq.org/wine/wine-mono/11.1.0/wine-mono-11.1.0-x86.msi" \
            -o /tmp/fex-rootfs/usr/share/wine/mono/wine-mono-11.1.0-x86.msi

          # ── Wine prefix initialization ──
          sudo chroot /tmp/fex-rootfs sh -c '
            export WINEDLLOVERRIDES="winemenubuilder.exe=d;mshtml=d;mscoree=d"
            export DISPLAY=""
            export WINEDEBUG=-all
            timeout 60 wine64 wineboot --init --force 2>/dev/null || true
          '

          # ── Disable Gecko/Mono download prompts at runtime ──
          sudo chroot /tmp/fex-rootfs sh -c '
            export WINEDLLOVERRIDES="winemenubuilder.exe=d"
            export DISPLAY=""
            export WINEDEBUG=-all
            wine64 reg add "HKEY_CURRENT_USER\Software\Wine\Gecko" /v Disabled /t REG_DWORD /d 1 /f 2>/dev/null || true
            wine64 reg add "HKEY_CURRENT_USER\Software\Wine\Mono" /v Disabled /t REG_DWORD /d 1 /f 2>/dev/null || true
          '

          # ── Clean up ──
          sudo chroot /tmp/fex-rootfs apt-get clean
          sudo rm -rf /tmp/fex-rootfs/var/lib/apt/lists/*
          sudo rm -f /tmp/fex-rootfs/usr/sbin/policy-rc.d
          sudo rm -rf /tmp/fex-rootfs/root/.wine/drive_c/users/*/Temp/* /tmp/fex-rootfs/root/.wine/drive_c/windows/temp/* 2>/dev/null || true

          sudo chmod -R +w /tmp/fex-rootfs

          sudo rm -rf /tmp/fex-rootfs/tmp
          sudo mkdir -p /tmp/fex-rootfs/tmp
          sudo chmod 1777 /tmp/fex-rootfs/tmp
          sudo rm -rf /tmp/fex-rootfs/root
          sudo mkdir -p /tmp/fex-rootfs/root
          sudo chmod 755 /tmp/fex-rootfs/root

          sudo touch /tmp/fex-rootfs/.steam_deps_ready

          sudo umount /tmp/fex-rootfs/dev/pts || sudo umount -l /tmp/fex-rootfs/dev/pts
          sudo umount /tmp/fex-rootfs/dev || sudo umount -l /tmp/fex-rootfs/dev
          sudo umount /tmp/fex-rootfs/sys || sudo umount -l /tmp/fex-rootfs/sys
          sudo umount /tmp/fex-rootfs/proc || sudo umount -l /tmp/fex-rootfs/proc
          trap - EXIT

          sudo tar -czf fex-rootfs-steam.tar.gz -C /tmp/fex-rootfs \
            --exclude='./proc/*' \
            --exclude='./sys/*' \
            --exclude='./dev/*' \
            --exclude='./run/*' \
            .

          sudo chown $(id -u):$(id -g) fex-rootfs-steam.tar.gz
          sudo rm -rf /tmp/fex-rootfs /tmp/Ubuntu_24_04.sqsh
          echo "Size: $(du -sh fex-rootfs-steam.tar.gz)"

      # ── Upload guest rootfs for the release job ──
      - name: Upload guest rootfs
        uses: actions/upload-artifact@v6
        with:
          name: guest-rootfs
          path: fex-rootfs-steam.tar.gz
          retention-days: 1
          compression-level: 0

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 3 — Build FEX from source on ARM64
  #   Why ARM64 native: FEX itself only supports AArch64 hosts (x86_64 host
  #   builds are CI-only debug config via -DENABLE_X86_HOST_DEBUG=True).
  #   rpmalloc causes a TLS-init-order segfault under glibc-on-Android
  #   (FEX-2603+, PR #5235 never merged). Disabling it falls back to
  #   glibc malloc — safe for x86-64 guests (Steam), the only use case.
  # ═══════════════════════════════════════════════════════════════════════════
  build-fex:
    needs: [resolve-versions]
    runs-on: ubuntu-24.04-arm
    if: needs.resolve-versions.outputs.changed_fex == 'true'

    steps:
      - name: Install FEX build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build lld ccache

      - name: Checkout FEX source (${{ needs.resolve-versions.outputs.fex_version }})
        uses: actions/checkout@v4
        with:
          repository: FEX-Emu/FEX
          ref: ${{ needs.resolve-versions.outputs.fex_version }}
          path: FEX-Source
          fetch-depth: 1

      - name: Initialize submodules
        run: |
          cd FEX-Source
          git submodule update --init --depth 1

      - name: ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: fex-ccache-${{ runner.arch }}-${{ hashFiles('FEX-Source/Source/**/*.cpp', 'FEX-Source/Source/**/*.h', 'FEX-Source/FEXCore/**/*.cpp', 'FEX-Source/FEXCore/**/*.h') }}
          restore-keys: |
            fex-ccache-${{ runner.arch }}-

      - name: Configure CMake
        env:
          CC: clang
          CXX: clang++
        run: |
          cmake -S FEX-Source -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_LTO=True \
            -DENABLE_ASSERTIONS=False \
            -DBUILD_THUNKS=False \
            -DBUILD_FEXCONFIG=False \
            -DBUILD_TESTING=False \
            -DBUILD_STEAM_SUPPORT=False \
            -DENABLE_JEMALLOC_GLIBC_ALLOC=False \
            -DENABLE_FEX_ALLOCATOR=False \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DTUNE_CPU=generic \
            -DUSE_LINKER=lld

      - name: Build FEX
        run: cmake --build build

      - name: Package FEX binaries
        run: |
          DESTDIR="$PWD/fex-install" cmake --build build -t install
          cd fex-install
          tar czf ../fex-binaries.tar.gz ./usr
          ls -lh ../fex-binaries.tar.gz

      - name: Upload FEX binaries
        uses: actions/upload-artifact@v6
        with:
          name: fex-binaries
          path: fex-binaries.tar.gz
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 4 — Gather, checksum, manifest, release
  #   Runs when ANY build job succeeded. Downloads only the artifacts from
  #   successful build jobs. Generates manifest.json with version strings
  #   (from resolve-versions) and SHA256 checksums (from available files).
  # ═══════════════════════════════════════════════════════════════════════════
  release:
    needs: [resolve-versions, build-host-assets, build-guest-rootfs, build-fex]
    if: always() && (
      needs.build-host-assets.result   == 'success' ||
      needs.build-guest-rootfs.result  == 'success' ||
      needs.build-fex.result           == 'success')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure assets directory exists
        run: mkdir -p assets

      # ── Download artifacts from successful build jobs ──
      - name: Download host assets
        if: needs.build-host-assets.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: host-assets
          path: assets/

      - name: Download guest rootfs
        if: needs.build-guest-rootfs.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: guest-rootfs
          path: assets/

      - name: Download FEX binaries
        if: needs.build-fex.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: fex-binaries
          path: assets/

      - name: List available assets
        run: ls -lh assets/ || echo "(no assets yet)"

      # ── Compute SHA256 checksums for available files ──
      - name: Compute SHA256 checksums
        id: checksums
        run: |
          for f in assets/*; do
            name=$(basename "$f")
            sha=$(sha256sum "$f" | awk '{print $1}')
            echo "sha_${name%.tar.gz}_${name##*.}=$sha" >> "$GITHUB_OUTPUT"
            # Also write safe key names
            case "$name" in
              rootfs.tar.gz)           echo "sha_rootfs=$sha" >> "$GITHUB_OUTPUT" ;;
              proot.tar.gz)            echo "sha_proot=$sha" >> "$GITHUB_OUTPUT" ;;
              dxvk.tar.gz)             echo "sha_dxvk=$sha" >> "$GITHUB_OUTPUT" ;;
              vkd3d-proton.tar.gz)     echo "sha_vkd3d=$sha" >> "$GITHUB_OUTPUT" ;;
              turnip.tar.gz)           echo "sha_turnip=$sha" >> "$GITHUB_OUTPUT" ;;
              InstallFEX.py)           echo "sha_fex=$sha" >> "$GITHUB_OUTPUT" ;;
              fex-binaries.tar.gz)     echo "sha_fex_binaries=$sha" >> "$GITHUB_OUTPUT" ;;
              fex-rootfs-steam.tar.gz) echo "sha_fex_rootfs_steam=$sha" >> "$GITHUB_OUTPUT" ;;
            esac
          done

      # ── 5. Determine release tag ─────────────────────────────────────────
      - name: Compute release tag
        id: tag
        run: echo "tag=assets-$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      # ── 6. Generate manifest.json ────────────────────────────────────────
      - name: Update manifest.json
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          # Build a manifest entry per component only if the asset file exists
          jq -n \
            --arg ts "$TIMESTAMP" \
            --arg rootfs_ver     "${{ needs.resolve-versions.outputs.rootfs_version }}" \
            --arg proot_ver      "${{ needs.resolve-versions.outputs.proot_version }}" \
            --arg dxvk_ver       "${{ needs.resolve-versions.outputs.dxvk_version }}" \
            --arg vkd3d_ver      "${{ needs.resolve-versions.outputs.vkd3d_version }}" \
            --arg turnip_ver     "${{ needs.resolve-versions.outputs.turnip_version }}" \
            --arg fex_ver        "${{ needs.resolve-versions.outputs.fex_version }}" \
            --arg fex_rootfs_ver "${{ needs.resolve-versions.outputs.fex_rootfs_version }}" \
            --arg rootfs_url     "${BASE_URL}/rootfs.tar.gz" \
            --arg proot_url      "${BASE_URL}/proot.tar.gz" \
            --arg dxvk_url       "${BASE_URL}/dxvk.tar.gz" \
            --arg vkd3d_url      "${BASE_URL}/vkd3d-proton.tar.gz" \
            --arg turnip_url     "${BASE_URL}/turnip.tar.gz" \
            --arg fex_url        "${BASE_URL}/InstallFEX.py" \
            --arg fex_bin_url    "${BASE_URL}/fex-binaries.tar.gz" \
            --arg fex_rootfs_url "${BASE_URL}/fex-rootfs-steam.tar.gz" \
            --arg sha_rootfs       "${{ steps.checksums.outputs.sha_rootfs }}" \
            --arg sha_proot        "${{ steps.checksums.outputs.sha_proot }}" \
            --arg sha_dxvk         "${{ steps.checksums.outputs.sha_dxvk }}" \
            --arg sha_vkd3d        "${{ steps.checksums.outputs.sha_vkd3d }}" \
            --arg sha_turnip       "${{ steps.checksums.outputs.sha_turnip }}" \
            --arg sha_fex          "${{ steps.checksums.outputs.sha_fex }}" \
            --arg sha_fex_binaries "${{ steps.checksums.outputs.sha_fex_binaries }}" \
            --arg sha_fex_rootfs   "${{ steps.checksums.outputs.sha_fex_rootfs_steam }}" \
            '{
              updated_at: $ts
            }
            + (if ($sha_rootfs       | length > 0) then { rootfs:       { version: $rootfs_ver,     asset: "rootfs.tar.gz",          url: $rootfs_url,     sha256: $sha_rootfs       } } else {} end)
            + (if ($sha_proot        | length > 0) then { proot:        { version: $proot_ver,      asset: "proot.tar.gz",           url: $proot_url,      sha256: $sha_proot        } } else {} end)
            + (if ($sha_dxvk         | length > 0) then { dxvk:         { version: $dxvk_ver,       asset: "dxvk.tar.gz",            url: $dxvk_url,       sha256: $sha_dxvk         } } else {} end)
            + (if ($sha_vkd3d        | length > 0) then { vkd3d:        { version: $vkd3d_ver,      asset: "vkd3d-proton.tar.gz",    url: $vkd3d_url,      sha256: $sha_vkd3d        } } else {} end)
            + (if ($sha_turnip       | length > 0) then { turnip:       { version: $turnip_ver,     asset: "turnip.tar.gz",          url: $turnip_url,     sha256: $sha_turnip       } } else {} end)
            + (if ($sha_fex          | length > 0) then { fex:          { version: $fex_ver,        asset: "InstallFEX.py",          url: $fex_url,        sha256: $sha_fex          } } else {} end)
            + (if ($sha_fex_binaries | length > 0) then { fex_binaries: { version: $fex_ver,        asset: "fex-binaries.tar.gz",    url: $fex_bin_url,    sha256: $sha_fex_binaries } } else {} end)
            + (if ($sha_fex_rootfs   | length > 0) then { fex_rootfs_steam: { version: $fex_rootfs_ver, asset: "fex-rootfs-steam.tar.gz", url: $fex_rootfs_url, sha256: $sha_fex_rootfs } } else {} end)
            ' > manifest.json

          echo "manifest.json:"
          cat manifest.json

      # ── 7. Publish GitHub Release ────────────────────────────────────────
      - name: Create GitHub Release
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin --delete "refs/tags/$TAG" 2>/dev/null || true

          # Build asset list from whatever files exist
          ASSETS=""
          for f in assets/*; do
            [ -f "$f" ] && ASSETS="$ASSETS $f"
          done

          gh release create "$TAG" \
            --title "DroidDeck Assets – $(date -u +%Y-%m-%d)" \
            --notes "## Component versions

          | Component | Version |
          |-----------|---------|
          | RootFS | ${{ needs.resolve-versions.outputs.rootfs_version }} |
          | PRoot | ${{ needs.resolve-versions.outputs.proot_version }} |
          | DXVK | ${{ needs.resolve-versions.outputs.dxvk_version }} |
          | VKD3D-Proton | ${{ needs.resolve-versions.outputs.vkd3d_version }} |
          | Turnip | ${{ needs.resolve-versions.outputs.turnip_version }} |
          | FEX | ${{ needs.resolve-versions.outputs.fex_version }} |
          | FEX rootfs (Steam) | ${{ needs.resolve-versions.outputs.fex_rootfs_version }} |" \
            $ASSETS \
            manifest.json

      # ── 8. Commit updated manifest.json back to repo ─────────────────────
      - name: Commit manifest.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "chore: update manifest for ${{ steps.tag.outputs.tag }}" || true
          git pull --rebase origin main
          git push origin main
