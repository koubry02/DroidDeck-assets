name: Update Assets

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # Weekly - Sunday midnight

jobs:
  update-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y zstd jq

      # ========== PRoot ==========
      - name: Download PRoot
        run: |
          PROOT_VERSION=$(curl -s "https://api.github.com/repos/proot-me/proot/releases/latest" | jq -r '.tag_name')
          PROOT_URL=$(curl -s "https://api.github.com/repos/proot-me/proot/releases/latest" | jq -r '.assets[].browser_download_url' | grep aarch64-static)
          echo "Downloading PRoot $PROOT_VERSION"
          curl -sL "$PROOT_URL" -o proot
          chmod +x proot
          echo "$PROOT_VERSION" > version_proot.txt

      # ========== DXVK ==========
      - name: Download DXVK
        run: |
          DXVK_VERSION=$(curl -s "https://api.github.com/repos/doitsujin/dxvk/releases/latest" | jq -r '.tag_name')
          DXVK_URL=$(curl -s "https://api.github.com/repos/doitsujin/dxvk/releases/latest" | jq -r '.assets[].browser_download_url' | grep linux | grep tar.gz)
          echo "Downloading DXVK $DXVK_VERSION"
          curl -sL "$DXVK_URL" -o dxvk.tar.gz
          echo "$DXVK_VERSION" > version_dxvk.txt

      # ========== VKD3D-Proton ==========
      - name: Download VKD3D-Proton
        run: |
          VKD3D_VERSION=$(curl -s "https://api.github.com/repos/HansKristian-Work/vkd3d-proton/releases/latest" | jq -r '.tag_name')
          VKD3D_URL=$(curl -s "https://api.github.com/repos/HansKristian-Work/vkd3d-proton/releases/latest" | jq -r '.assets[].browser_download_url' | grep tar.zst)
          echo "Downloading VKD3D-Proton $VKD3D_VERSION"
          curl -sL "$VKD3D_URL" -o vkd3d-proton.tar.zst
          # Convert to tar.gz
          tar -I zstd -xf vkd3d-proton.tar.zst
          FOLDER=$(ls -d vkd3d-proton-*/)
          tar -czf vkd3d-proton.tar.gz "$FOLDER"
          rm -rf "$FOLDER" vkd3d-proton.tar.zst
          echo "$VKD3D_VERSION" > version_vkd3d.txt

      # ========== Turnip ==========
      - name: Download Turnip
        run: |
          TURNIP_VERSION=$(curl -s "https://api.github.com/repos/whitebelyash/freedreno_turnip-CI/releases/latest" | jq -r '.tag_name')
          TURNIP_URL=$(curl -s "https://api.github.com/repos/whitebelyash/freedreno_turnip-CI/releases/latest" | jq -r '.assets[].browser_download_url' | grep a8xx-gen8 | grep zip)
          echo "Downloading Turnip $TURNIP_VERSION"
          curl -sL "$TURNIP_URL" -o turnip.zip
          echo "$TURNIP_VERSION" > version_turnip.txt

      # ========== Create Release ==========
      - name: Create release
        id: create-release
        run: |
          DATE=$(date -u +%Y%m%d)
          RELEASE_TAG="v${DATE}"
          
          # Delete existing release if exists
          EXISTING=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$RELEASE_TAG" | jq -r '.id // empty')
          
          if [ -n "$EXISTING" ]; then
            curl -s -X DELETE -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$EXISTING"
          fi
          
          # Create release
          RESPONSE=$(curl -s -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"$RELEASE_TAG\", \"name\": \"DroidDeck Assets $RELEASE_TAG\", \"draft\": false}" \
            "https://api.github.com/repos/${{ github.repository }}/releases")
          
          RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id')
          echo "Created release: $RELEASE_TAG (ID: $RELEASE_ID)"
          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT

      # ========== Upload Assets ==========
      - name: Upload all assets
        run: |
          PROOT_VER=$(cat version_proot.txt)
          DXVK_VER=$(cat version_dxvk.txt)
          VKD3D_VER=$(cat version_vkd3d.txt)
          TURNIP_VER=$(cat version_turnip.txt)
          RELEASE_ID=${{ steps.create-release.outputs.release_id }}
          
          # Upload PRoot
          curl -s -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @proot \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=proot-$PROOT_VER"
          
          # Upload DXVK
          curl -s -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/gzip" \
            --data-binary @dxvk.tar.gz \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=dxvk-$DXVK_VER.tar.gz"
          
          # Upload VKD3D
          curl -s -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/gzip" \
            --data-binary @vkd3d-proton.tar.gz \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=vkd3d-proton-$VKD3D_VER.tar.gz"
          
          # Upload Turnip
          curl -s -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/zip" \
            --data-binary @turnip.zip \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=turnip-$TURNIP_VER.zip"

      # ========== Create and Upload manifest ==========
      - name: Create manifest
        run: |
          PROOT_VER=$(cat version_proot.txt)
          DXVK_VER=$(cat version_dxvk.txt)
          VKD3D_VER=$(cat version_vkd3d.txt)
          TURNIP_VER=$(cat version_turnip.txt)
          
          cat > manifest.json << EOF
          {
            "version": "$(date -u +%Y-%m-%d)",
            "components": {
              "proot": {
                "version": "$PROOT_VER",
                "url": "https://github.com/${{ github.repository }}/releases/download/$(date -u +%Y%m%d)/proot-$PROOT_VER"
              },
              "dxvk": {
                "version": "$DXVK_VER",
                "url": "https://github.com/${{ github.repository }}/releases/download/$(date -u +%Y%m%d)/dxvk-$DXVK_VER.tar.gz"
              },
              "vkd3d-proton": {
                "version": "$VKD3D_VER",
                "url": "https://github.com/${{ github.repository }}/releases/download/$(date -u +%Y%m%d)/vkd3d-proton-$VKD3D_VER.tar.gz"
              },
              "turnip": {
                "version": "$TURNIP_VER",
                "url": "https://github.com/${{ github.repository }}/releases/download/$(date -u +%Y%m%d)/turnip-$TURNIP_VER.zip"
              }
            },
            "note": "FEX and RootFS must be downloaded on device via FEXRootFSFetcher"
          }
          EOF
          echo "manifest_created=true" >> $GITHUB_OUTPUT

      - name: Upload manifest
        run: |
          curl -s -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data-binary @manifest.json \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.create-release.outputs.release_id }}/assets?name=manifest.json"

      # ========== Update manifest in repo ==========
      - name: Commit manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "Update manifest with latest versions" || echo "No changes"
          git push

      - name: Summary
        run: |
          PROOT_VER=$(cat version_proot.txt)
          DXVK_VER=$(cat version_dxvk.txt)
          VKD3D_VER=$(cat version_vkd3d.txt)
          TURNIP_VER=$(cat version_turnip.txt)
          echo "## Assets Updated"
          echo ""
          echo "| Component | Version |"
          echo "|----------|---------|"
          echo "| PRoot | $PROOT_VER |"
          echo "| DXVK | $DXVK_VER |"
          echo "| VKD3D-Proton | $VKD3D_VER |"
          echo "| Turnip | $TURNIP_VER |"